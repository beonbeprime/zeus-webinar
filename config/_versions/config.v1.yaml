# ===================================================================
# Squad: Webinar Infalivel (Webinario Infalivel)
# Domain: Webinario Infalivel - Metodologia Tayoba
# Version: 1.0.0
# ===================================================================

squad:
  name: webinar-infalivel
  display_name: "Webinar Infalivel Squad"
  version: "1.0.0"
  domain: "Webinario infalivel - roteiro 14 blocos, pitch, aquecimento, replay, follow-up, downsell, evergreen e conversao"
  description: |
    Squad de 50 agentes especializados na metodologia Webinario Infalivel (Tayoba).
    Pipeline completo: briefing > pesquisa > promessa > copy > webinario 14 blocos > criativos > pos-webinario > metricas.
    Cada agente domina uma etapa especifica do metodo com frameworks extraidos do documento-base.
  keywords: [webinario, webinar, tayoba, funil-webinario, pitch, replay, evergreen, comparecimento, conversao, trafego, comercial, metricas]
  entry_agent: webinar-chief
  created_at: "2026-03-29"

tiers:
  tier_0:
    name: "Comando Central"
    agents: [webinar-chief, webinar-deputy, webinar-master-planner, webinar-questioner, webinar-intake-specialist, webinar-final-reviewer]
    purpose: "Orquestracao do pipeline completo, briefing, questionamento de premissas, routing entre tiers, quality gate final, compliance com metodologia"
  tier_1a:
    name: "Estrategia e Promessa"
    agents: [researcher, promise-architect, big-idea-specialist, narrative-analyst, strategic-planner, financial-planner]
    purpose: "Pesquisa de mercado, criacao da promessa central, Big Idea, arco narrativo, planejamento macro e economia do funil"
  tier_1b:
    name: "Copy e Linguagem"
    agents: [headline-specialist, page-copy-specialist, email-specialist, whatsapp-specialist, ad-copy-specialist, copy-reviewer]
    purpose: "Copy de pagina de captura e vendas, headlines, emails de aquecimento e recuperacao, WhatsApp, anuncios, revisao de copy"
  tier_1c:
    name: "Webinario e Conteudo"
    agents: [webinar-architect, script-writer, pitch-specialist, warmup-specialist, authority-builder, belief-breaker, webinar-reviewer]
    purpose: "Estrutura do webinario 14 blocos, roteiro completo, pitch, aquecimento pre-webinario, stack de autoridade, quebra de crencas"
  tier_1d:
    name: "Trafego e Criativos"
    agents: [creative-planner, creative-script-writer, remarketing-specialist, traffic-data-planner, creative-reviewer]
    purpose: "Plano tatico de criativos, roteiros de video, remarketing por comportamento, dados de trafego, revisao"
  tier_1e:
    name: "Pos-Webinario e Follow-up"
    agents: [replay-strategist, scarcity-architect, followup-specialist, downsell-specialist, commercial-strategist, objection-handler, commercial-reviewer]
    purpose: "Estrategia de replay, calendario de escassez, follow-up por comportamento, downsell, comercial, objecoes, revisao"
  tier_1f:
    name: "Metricas, Dados e Operacao"
    agents: [metrics-analyst, diagnostics-specialist, checklist-manager, crm-operations-specialist, team-operations-planner, decision-notebook-specialist]
    purpose: "KPIs, diagnostico por etapa, checklists operacionais, CRM, equipe, caderno de decisao diario"
  tier_1g:
    name: "Oferta, Produto e Automacao"
    agents: [offer-architect, bonus-architect, funnel-architect, evergreen-specialist, page-builder-coordinator, compliance-specialist, post-webinar-product-planner]
    purpose: "Arquitetura de oferta, bonus estrategicos, funil completo, automacao evergreen, coordenacao de paginas, compliance LGPD, produto pos-webinario"

agents:
  # Tier 0
  webinar-chief:
