cross_squad:
  - squad: page-forge
    trigger: "page-builder-coordinator precisa construir pagina de captura, replay ou vendas"
    agents_used: [iris]
  - squad: copy-squad
    trigger: "copy profundo ou especializado para sales letter ou VSL"
    agents_used: [copy-chief, gary-halbert, eugene-schwartz]
  - squad: ads
    trigger: "execucao de trafego pago para captacao e remarketing"
    agents_used: [bolt]
  - squad: storytelling
    trigger: "arco narrativo profundo do webinario ou pitch script"
    agents_used: [story-chief, oren-klaff]
  - squad: hormozi
    trigger: "framework de oferta irresistivel para o pitch"
    agents_used: [hormozi-offers, hormozi-pricing]
  - squad: launch-paid
    trigger: "comparacao webinario vs lancamento pago ou hibridizacao de modelos"
    agents_used: [launch-chief]

settings:
  activation:
    prefix: "webinar-infalivel"
    example: "@webinar-infalivel:webinar-chief"
  methodology:
    source: "webinario_infalivel_tayoba.md"
    rules:
      - "Webinario e sistema de aquisicao, qualificacao, educacao, conversao e retencao"
      - "Promessa mostra resultado concreto alcancavel em 60-120 minutos"
      - "Roteiro com 14 blocos: abertura > promessa > autoridade > diagnostico > quebra crencas > metodo > prova > transicao > pitch > bonus > garantia > urgencia > FAQ > CTA"
      - "Comparecimento minimo 30% - aquecimento e obrigatorio"
      - "Replay e parcela substancial do faturamento - delay estrategico obrigatorio"
      - "Follow-up priorizado por comportamento, nao aleatorio"
      - "Downsell quando faz sentido: timing certo, ticket adequado"
      - "Modelo pode ser ao vivo, automatizado ou hibrido"
      - "Automacao como diferencial: escala sem limite"
      - "Compliance LGPD desde o inicio"
      - "Modelo simples vence modelo complexo"
